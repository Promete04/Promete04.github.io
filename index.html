<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuillermoRS</title>


    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/fonts.css">
    <link rel="stylesheet" href="assets/css/fontawesome.css">

    <style>
        /* Only keep styles that Tailwind doesn't handle, like specific transitions if not in input.css */
        /* Note: Most of this is now in assets/css/input.css */
    </style>
</head>

<body
    class="bg-light-bg dark:bg-dark-bg text-light-text dark:text-dark-text font-sans min-h-screen flex flex-col selection:bg-brand-500 selection:text-white">

    <!-- Navigation -->
    <nav
        class="bg-white/80 dark:bg-dark-bg/90 border-b border-gray-200 dark:border-slate-800 sticky top-0 z-50 backdrop-blur-sm">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <!-- Brand -->
                <div class="flex items-center shrink-0">
                    <span class="text-lg font-bold text-slate-800 dark:text-white cursor-pointer"
                        onclick="renderSection('home')">
                        GuillermoRS
                    </span>
                </div>

                <!-- Desktop Nav & Search -->
                <div class="hidden md:flex items-center space-x-1 ml-8 flex-1 justify-end">
                    <!-- Search Bar -->
                    <div class="relative group mr-4">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                            <i class="fas fa-search text-gray-400 group-focus-within:text-brand-500 transition"></i>
                        </div>
                        <input type="text" id="searchInput" oninput="handleSearch(this.value)" placeholder="Search..."
                            class="bg-gray-100 dark:bg-slate-800 text-sm rounded-full pl-10 pr-4 py-1.5 focus:outline-none focus:ring-2 focus:ring-brand-500 w-48 focus:w-64 transition-all text-slate-800 dark:text-white placeholder-gray-500 border border-transparent dark:border-slate-700">
                    </div>

                    <button onclick="renderSection('home')"
                        class="nav-btn px-3 py-2 rounded text-sm font-medium hover:text-brand-600 dark:hover:text-brand-500 transition">Home</button>
                    <button onclick="renderSection('projects')"
                        class="nav-btn px-3 py-2 rounded text-sm font-medium hover:text-brand-600 dark:hover:text-brand-500 transition">Projects</button>
                    <button onclick="renderSection('cv')"
                        class="nav-btn px-3 py-2 rounded text-sm font-medium hover:text-brand-600 dark:hover:text-brand-500 transition">Resume</button>
                    <button onclick="renderSection('blog')"
                        class="nav-btn px-3 py-2 rounded text-sm font-medium hover:text-brand-600 dark:hover:text-brand-500 transition">Blog</button>

                    <button onclick="toggleTheme()"
                        class="ml-2 p-2 rounded-full hover:bg-gray-100 dark:hover:bg-slate-800 transition text-brand-600 dark:text-brand-500">
                        <i id="theme-icon" class="fas fa-sun"></i>
                    </button>
                </div>

                <!-- Mobile Menu Button -->
                <div class="md:hidden flex items-center">
                    <button onclick="toggleTheme()" class="mr-4 p-2 text-brand-600 dark:text-brand-500"><i
                            id="theme-icon-mobile" class="fas fa-sun"></i></button>
                    <button class="text-gray-500 hover:text-white" onclick="alert('Mobile menu would go here')"><i
                            class="fas fa-bars"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="app" class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
        <!-- Content injected via JS -->
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-200 dark:border-slate-800 mt-auto">
        <div class="max-w-5xl mx-auto py-8 px-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="text-light-muted dark:text-dark-muted text-xs">
                <p>&copy; 2026 Guillermo Ramos Santos.</p>
            </div>
            <div class="flex space-x-6">
                <a href="https://github.com/Promete04"
                    class="text-gray-400 hover:text-brand-600 dark:hover:text-brand-500 transition"><i
                        class="fab fa-github text-lg"></i></a>
                <a href="https://www.linkedin.com/in/guillermo-ramos-santos-a4313b291"
                    class="text-gray-400 hover:text-brand-600 dark:hover:text-brand-500 transition"><i
                        class="fab fa-linkedin text-lg"></i></a>
            </div>
        </div>
    </footer>

    <!-- App Scripts -->
    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
</body>

</html>
